name: Pull Request Gate CI

on: pull_request

env:
  JAVA_VERSION: 25

jobs:
  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        java_version: [17]
        os: [ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew build javadoc generateReferenceEN generateReferenceJA -x :integration-tests:fido-mds-integration:check

  matrix-test:
    name: Test on java ${{ matrix.java_version }} and ${{ matrix.os }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java_version: [17, 21, 25]
        os: [ubuntu-latest, windows-latest] # , macOS-latest (remove macOS as it is not stable for now)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew check -PtoolchainJdkVersion=${{ matrix.java_version }} -x :integration-tests:fido-mds-integration:check

  # Run FIDO MDS integration tests separately to avoid rate limiting
  # from the FIDO Metadata Service (https://mds.fidoalliance.org/).
  # These tests must not run in parallel with other jobs that hit the same endpoint.
  fido-mds-integration-test:
    name: FIDO MDS Integration Test
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Run FIDO MDS integration tests
        run: ./gradlew :integration-tests:fido-mds-integration:check

  code-analysis:
    name: Code Analysis
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Build with Gradle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: if [ "$SONAR_TOKEN" != "" ]; then ./gradlew jacocoTestReport check sonar -Dsonar.organization=webauthn4j -Dsonar.host.url=https://sonarcloud.io -x :integration-tests:fido-mds-integration:check ; fi

  jitpack-comment:
    name: Comment with JitPack info
    needs: [build, matrix-test, fido-mds-integration-test, code-analysis]
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;
            const version = `${branch}-SNAPSHOT`;
            
            const body = `## 📦 JitPack Build
            
            The build and tests passed! You can test this Pull Request using [JitPack](https://jitpack.io).
            
            ### Maven
            
            \`\`\`xml
            <repositories>
                <repository>
                    <id>jitpack.io</id>
                    <url>https://jitpack.io</url>
                </repository>
            </repositories>
            
            <dependency>
                <groupId>com.github.${repoOwner}.${repoName}</groupId>
                <artifactId>webauthn4j-core</artifactId>
                <version>${version}</version>
            </dependency>
            \`\`\`
            
            ### Gradle
            
            \`\`\`groovy
            repositories {
                maven { url 'https://jitpack.io' }
            }
            
            dependencies {
                implementation 'com.github.${repoOwner}.${repoName}:webauthn4j-core:${version}'
            }
            \`\`\`
            
            You can verify the build status on [JitPack](https://jitpack.io/#${repoOwner}/${repoName}/${version}).
            `;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: repoOwner,
              repo: repoName,
              issue_number: prNumber,
            });
            
            const botComment = comments.find(c => c.body.includes("## 📦 JitPack Build") && c.user.type === 'Bot');
            
            if (botComment) {
               await github.rest.issues.updateComment({
                 owner: repoOwner,
                 repo: repoName,
                 comment_id: botComment.id,
                 body: body
               });
            } else {
               await github.rest.issues.createComment({
                 owner: repoOwner,
                 repo: repoName,
                 issue_number: prNumber,
                 body: body
               });
            }
