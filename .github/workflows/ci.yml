name: CI

on:
  push:
    tags:
      - '*'
    branches:
      - '*'
  schedule:
    # everyday 10AM (UTC)
    - cron: '0 10 * * *'

jobs:
  build:
    name: Build
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java_version: [25]
        os: [ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew build javadoc asciidoc -x :integration-tests:fido-mds-integration:check

  matrix-test:
    name: Test on java ${{ matrix.java_version }} and ${{ matrix.os }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java_version: [17, 21, 25]
        os: [ubuntu-latest, windows-latest] # , macOS-latest (remove macOS as it is not stable for now)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew check -PtoolchainJdkVersion=${{ matrix.java_version }} -x :integration-tests:fido-mds-integration:check

  # Run FIDO MDS integration tests separately to avoid rate limiting
  # from the FIDO Metadata Service (https://mds.fidoalliance.org/).
  # These tests must not run in parallel with other jobs that hit the same endpoint.
  fido-mds-integration-test:
    name: FIDO MDS Integration Test
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'

      - name: Run FIDO MDS integration tests
        run: ./gradlew :integration-tests:fido-mds-integration:check

  code-analysis:
    name: Code Analysis
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java_version: [25]
        os: [ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}
          cache: 'gradle'

      - name: Build with Gradle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: if [ "$SONAR_TOKEN" != "" ]; then ./gradlew jacocoTestReport check sonar -Dsonar.organization=webauthn4j -Dsonar.host.url=https://sonarcloud.io -x :integration-tests:fido-mds-integration:check ; fi
