name: Release

on:
  workflow_dispatch:

env:
  JAVA_VERSION: 25

jobs:
  release:
    permissions:
      contents: write

    runs-on: ubuntu-24.04

    steps:
      - name: Generate GitHub App(webauthn4j-github-app-bot) Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        id: setup-java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Switch to release
        run: |
          ./gradlew switchToRelease

      - name: Update versions in documents
        run: |
          ./gradlew updateVersionsInDocuments

      - name: Build with Gradle
        run: |
          ./gradlew build javadoc generateReferenceEN generateReferenceJA

      - name: Commit changes
        shell: bash
        run: |
          VERSION=$(grep "webAuthn4JVersion" gradle.properties | cut -d'=' -f2)
          git config user.name "webauthn4j-bot"
          git config user.email  "info@webauthn4j.com"
          git add .
          git commit --allow-empty -m "Release ${VERSION}"

      - name: Push commit
        shell: bash
        run: |
          git fetch
          git rebase origin/master
          git push

      - name: Tag commit
        shell: bash
        run: |
          VERSION=$(grep "webAuthn4JVersion" gradle.properties | cut -d'=' -f2)
          git tag "${VERSION}.RELEASE"

      - name: Push tag
        shell: bash
        run: |
          VERSION=$(grep "webAuthn4JVersion" gradle.properties | cut -d'=' -f2)
          git fetch
          git rebase origin/master
          git push origin "${VERSION}.RELEASE"


      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USER: ${{ secrets.MAVEN_CENTRAL_USER }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
          PGP_SIGNING_KEY_PASSPHRASE: ${{ secrets.PGP_SIGNING_KEY_PASSPHRASE }}
        run: |
          ./gradlew publishToCentralPortal

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          VERSION=$(grep "webAuthn4JVersion" gradle.properties | cut -d'=' -f2)
          JDK_VERSION="${{ steps.setup-java.outputs.version }}"
          gh release create "${VERSION}.RELEASE" \
            --draft \
            --generate-notes \
            --title "${VERSION}.RELEASE"
          EXISTING_NOTES=$(gh release view "${VERSION}.RELEASE" --json body --jq .body)
          GRADLE_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          gh release edit "${VERSION}.RELEASE" --notes "$(cat <<EOF
          ${EXISTING_NOTES}

          ## Build Configuration

          | Item | Value |
          |------|-------|
          | JDK | Eclipse Temurin \`${JDK_VERSION}\` |
          | Gradle | \`${GRADLE_VERSION}\` |
          EOF
          )"
